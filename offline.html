<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors connexion | StudyAlready</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0a2540" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { max-width: 560px; border: 1px solid #e2e8f0; border-radius: 24px; background: white; padding: 32px; box-shadow: 0 20px 50px rgba(15, 23, 42, .08); }
    .badge { display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; background: #fff7ed; color: #92400e; padding: 6px 12px; font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    h1 { margin: 18px 0 10px; color: #0a2540; font-size: clamp(28px, 6vw, 42px); line-height: 1.05; }
    p { color: #475569; line-height: 1.65; }
    a, button { border: 0; border-radius: 999px; background: #f5b800; color: #0a2540; cursor: pointer; display: inline-flex; font-weight: 800; margin-top: 16px; padding: 12px 18px; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="offlineTitle">
      <span class="badge">Mode hors connexion</span>
      <h1 id="offlineTitle">Connexion indisponible</h1>
      <p>Votre connexion semble interrompue. Les pages deja consultees peuvent rester accessibles, mais les formulaires, messages et documents de l'espace personnel demandent Internet.</p>
      <button type="button" onclick="window.location.reload()">Reessayer</button>
    </section>
  </main>
</body>
</html>
