<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirection… | StudyAlready</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-icon.svg" />
  <script>
    /* Page-pont : Supabase renvoie parfois l'utilisateur sur /dashboard
       au lieu de /espace-etudiant/dashboard.html (Site URL tronquée).
       On capture le hash + search (qui contiennent #access_token=...
       ou ?code=...) et on redirige vers /espace-etudiant/ qui gère la
       création de session. */
    (function () {
      try {
        var hash = window.location.hash || '';
        var search = window.location.search || '';
        window.location.replace('/espace-etudiant/' + hash + search);
      } catch (e) {
        window.location.replace('/espace-etudiant/');
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=/espace-etudiant/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .display { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 text-slate-800 px-4">
  <div class="text-center max-w-md">
    <div class="inline-flex w-16 h-16 rounded-2xl bg-[#0a2540] items-center justify-center mb-6">
      <span class="text-[#f5b800] display font-bold text-xl">SA</span>
    </div>
    <h1 class="display text-2xl font-bold text-[#0a2540]">Connexion en cours…</h1>
    <p class="mt-3 text-slate-600 text-sm">Nous vous redirigeons vers votre espace étudiant.</p>
    <p class="mt-6 text-xs text-slate-500">
      Si rien ne se passe :
      <a href="/espace-etudiant/" class="text-[#1e3a8a] underline font-semibold">cliquez ici</a>.
    </p>
  </div>
</body>
</html>
