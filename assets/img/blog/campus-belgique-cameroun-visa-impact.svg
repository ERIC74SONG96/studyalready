<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Campus Belgique Cameroun - Procedure visa etudes 2026</title>
  <desc id="desc">Illustration du parcours visa etudes: VOW, TLScontact, verification diplomes et entretien consulaire.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="140" cy="90" r="180" fill="#f5b800" opacity="0.14"/>
  <circle cx="1090" cy="560" r="220" fill="#0f172a" opacity="0.4"/>

  <rect x="70" y="64" width="76" height="76" rx="18" fill="#f5b800"/>
  <text x="108" y="114" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0a2540">SA</text>
  <text x="168" y="108" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">
    <tspan fill="#ffffff">Study</tspan><tspan fill="#f5b800">Already</tspan>
  </text>

  <text x="70" y="198" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">Campus Belgique (Cameroun)</text>
  <text x="70" y="260" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#f5b800">Impact sur le visa etudes 2026</text>
  <text x="70" y="305" font-family="Inter, Arial, sans-serif" font-size="24" fill="#cbd5e1">Parcours officiel: VOW, TLScontact, verification et entretien</text>

  <rect x="70" y="340" width="1060" height="220" rx="24" fill="url(#card)" opacity="0.98"/>
  <line x1="230" y1="450" x2="970" y2="450" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round"/>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <circle cx="230" cy="450" r="42" fill="#1e3a8a"/>
    <text x="230" y="458" font-size="18" font-weight="700" fill="#ffffff">VOW</text>
    <text x="230" y="515" font-size="19" font-weight="700" fill="#0a2540">Formulaire</text>

    <circle cx="415" cy="450" r="42" fill="#0a2540"/>
    <text x="415" y="458" font-size="17" font-weight="700" fill="#ffffff">TLS</text>
    <text x="415" y="515" font-size="19" font-weight="700" fill="#0a2540">Depot</text>

    <circle cx="600" cy="450" r="42" fill="#1e3a8a"/>
    <text x="600" y="458" font-size="16" font-weight="700" fill="#ffffff">OBC</text>
    <text x="600" y="515" font-size="19" font-weight="700" fill="#0a2540">Controle</text>

    <circle cx="785" cy="450" r="42" fill="#0a2540"/>
    <text x="785" y="458" font-size="14" font-weight="700" fill="#ffffff">ENTR.</text>
    <text x="785" y="515" font-size="19" font-weight="700" fill="#0a2540">Entretien</text>

    <circle cx="970" cy="450" r="42" fill="#1e3a8a"/>
    <text x="970" y="458" font-size="16" font-weight="700" fill="#ffffff">VISA</text>
    <text x="970" y="515" font-size="19" font-weight="700" fill="#0a2540">Decision</text>
  </g>
