<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Processus visa etudes 2026</title>
  <desc id="desc">Schema des etapes: VOW, rendez-vous TLScontact, depot, verification et decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="70" y="90" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#ffffff">Processus visa etudes - Cameroun vers Belgique</text>
  <text x="70" y="132" font-family="Inter, Arial, sans-serif" font-size="24" fill="#cbd5e1">Lecture rapide du circuit 2026</text>

  <line x1="120" y1="360" x2="1080" y2="360" stroke="#f5b800" stroke-width="8" stroke-linecap="round"/>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <circle cx="180" cy="360" r="54" fill="#ffffff"/>
    <text x="180" y="350" font-size="18" font-weight="700" fill="#0a2540">1</text>
    <text x="180" y="374" font-size="15" font-weight="600" fill="#0a2540">VOW</text>
    <text x="180" y="445" font-size="19" font-weight="700" fill="#ffffff">Compte + formulaire</text>

    <circle cx="390" cy="360" r="54" fill="#ffffff"/>
    <text x="390" y="350" font-size="18" font-weight="700" fill="#0a2540">2</text>
    <text x="390" y="374" font-size="15" font-weight="600" fill="#0a2540">RDV</text>
    <text x="390" y="445" font-size="19" font-weight="700" fill="#ffffff">Rendez-vous TLS</text>

    <circle cx="600" cy="360" r="54" fill="#ffffff"/>
    <text x="600" y="350" font-size="18" font-weight="700" fill="#0a2540">3</text>
    <text x="600" y="374" font-size="15" font-weight="600" fill="#0a2540">DEPOT</text>
    <text x="600" y="445" font-size="19" font-weight="700" fill="#ffffff">Depot dossier complet</text>

    <circle cx="810" cy="360" r="54" fill="#ffffff"/>
    <text x="810" y="350" font-size="18" font-weight="700" fill="#0a2540">4</text>
    <text x="810" y="374" font-size="15" font-weight="600" fill="#0a2540">VERIF</text>
    <text x="810" y="445" font-size="19" font-weight="700" fill="#ffffff">OBC/GCE + entretien</text>

    <circle cx="1020" cy="360" r="54" fill="#ffffff"/>
    <text x="1020" y="350" font-size="18" font-weight="700" fill="#0a2540">5</text>
    <text x="1020" y="374" font-size="15" font-weight="600" fill="#0a2540">DECISION</text>
    <text x="1020" y="445" font-size="19" font-weight="700" fill="#ffffff">Instruction consulaire</text>
  </g>

  <rect x="70" y="520" width="1060" height="120" rx="18" fill="#ffffff" opacity="0.1"/>
  <text x="100" y="570" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#f5b800">Point cle:</text>
  <text x="240" y="570" font-family="Inter, Arial, sans-serif" font-size="24" fill="#ffffff">sans dossier complet au depot, le risque de refus augmente.</text>
  <text x="100" y="608" font-family="Inter, Arial, sans-serif" font-size="20" fill="#cbd5e1">Verifier systematiquement les listes officielles avant chaque etape.</text>
</svg>
