<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Checklist dossier visa etudes</title>
  <desc id="desc">Illustration des controles de completude du dossier avant depot TLScontact.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="70" y="92" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff">Checklist avant depot du dossier visa</text>
  <text x="70" y="132" font-family="Inter, Arial, sans-serif" font-size="23" fill="#cbd5e1">Objectif: eviter un dossier transmis en l'etat</text>

  <rect x="70" y="170" width="1060" height="470" rx="24" fill="#ffffff" opacity="0.98"/>

  <g font-family="Inter, Arial, sans-serif" fill="#0a2540">
    <circle cx="128" cy="248" r="20" fill="#16a34a"/>
    <text x="128" y="256" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff"></text>
    <text x="165" y="256" font-size="28" font-weight="700">Admission ou preinscription verifiee</text>

    <circle cx="128" cy="322" r="20" fill="#16a34a"/>
    <text x="128" y="330" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff"></text>
    <text x="165" y="330" font-size="28" font-weight="700">Formulaire VOW complet et coherent</text>

    <circle cx="128" cy="396" r="20" fill="#16a34a"/>
    <text x="128" y="404" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff"></text>
    <text x="165" y="404" font-size="28" font-weight="700">Pieces legalisees et preuves de paiement</text>

    <circle cx="128" cy="470" r="20" fill="#16a34a"/>
    <text x="128" y="478" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff"></text>
    <text x="165" y="478" font-size="28" font-weight="700">Authentification OBC/GCE selon votre profil</text>

    <circle cx="128" cy="544" r="20" fill="#16a34a"/>
    <text x="128" y="552" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff"></text>
    <text x="165" y="552" font-size="28" font-weight="700">Dossier relu 48h avant rendez-vous TLScontact</text>
  </g>

  <rect x="70" y="658" width="1060" height="8" rx="4" fill="#f5b800"/>
</svg>
