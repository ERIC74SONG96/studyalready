<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mise en relation | StudyAlready</title>
  <meta name="description" content="Envoyer un message à un membre de l'annuaire StudyAlready. StudyAlready transmet votre message en préservant la vie privée du destinataire." />
  <link rel="canonical" href="https://www.studyalready.com/mise-en-relation.html" />
  <meta name="robots" content="noindex,follow" />
  <link rel="icon" type="image/svg+xml" href="assets/img/logo-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { brand: { dark: '#0a2540', blue: '#1e3a8a', gold: '#f5b800', cream: '#fff8e7' } },
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], display: ['Poppins', 'sans-serif'] }
    } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="font-sans text-slate-800 bg-slate-50 antialiased">
  <header class="border-b border-slate-200 bg-white">
    <nav class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between text-sm">
      <a href="annuaire.html" class="text-slate-600 hover:text-brand-dark">← Retour à l'annuaire</a>
      <a href="creer-profil.html" class="font-semibold text-brand-blue hover:underline">Créer mon profil</a>
    </nav>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-10">
    <div class="text-center">
      <h1 class="font-display text-2xl font-bold text-brand-dark">Envoyer un message à un membre</h1>
      <p id="targetInfo" class="mt-2 text-sm text-slate-600">Préparation du message…</p>
    </div>

    <form id="miseEnRelationForm" method="POST" class="mt-8 space-y-4 bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Votre prénom et nom <span class="text-red-600">*</span></label>
          <input type="text" name="nom" required class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-gold outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Votre email <span class="text-red-600">*</span></label>
          <input type="email" name="email" required class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-gold outline-none" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">Membre destinataire</label>
        <input type="text" id="memberLabel" name="destinataire" readonly class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm bg-slate-100 text-slate-700" />
        <input type="hidden" name="destinataire_id" id="memberId" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">Pourquoi ce message ? <span class="text-red-600">*</span></label>
        <select name="motif" required class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:ring-2 focus:ring-brand-gold outline-none">
          <option value="">— Choisir —</option>
          <option>Aide pour examens / cours</option>
          <option>Conseils filière / orientation</option>
          <option>Logement / vie étudiante</option>
          <option>Job étudiant / stage</option>
          <option>Mentorat insertion pro</option>
          <option>Autre (précisez)</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">Votre message <span class="text-red-600">*</span></label>
        <textarea name="message" rows="5" required class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-gold outline-none" placeholder="Présentez-vous brièvement, expliquez votre situation et ce que vous attendez de cet échange."></textarea>
      </div>
      <label class="flex items-start gap-2 text-xs text-slate-600">
        <input type="checkbox" name="consent" required class="mt-1" />
        <span>J'autorise StudyAlready à <strong>transmettre mon message</strong> au membre destinataire et à <strong>partager mes coordonnées</strong> avec lui pour permettre une éventuelle réponse. <span class="text-red-600">*</span></span>
      </label>

      <input type="text" name="website" tabindex="-1" autocomplete="off" class="hidden" aria-hidden="true" />

      <button type="submit" class="w-full bg-brand-gold hover:bg-yellow-500 text-brand-dark font-bold py-3 rounded-lg text-sm shadow-md">Envoyer le message via StudyAlready</button>
      <p id="miseEnRelationStatus" class="text-sm text-center hidden"></p>
      <p class="text-xs text-slate-500 text-center">Aucune réponse automatique : nous transmettons le message au membre, qui décide s'il vous recontacte.</p>
    </form>
  </main>

  <footer class="bg-slate-900 text-slate-400 py-6 text-center text-sm">
    <p>© <span id="year"></span> StudyAlready · <a href="politique-confidentialite.html" class="hover:text-brand-gold">Confidentialité</a></p>
  </footer>

  <script>
    (function () {
      try {
        var sp = new URLSearchParams(window.location.search);
        var name = sp.get('nom') || 'Membre StudyAlready';
        var id = sp.get('id') || '';
        var info = document.getElementById('targetInfo');
        var label = document.getElementById('memberLabel');
        var idField = document.getElementById('memberId');
        if (info) info.textContent = 'Vous écrivez à : ' + name;
        if (label) label.value = name;
        if (idField) idField.value = id;
      } catch (e) {}
    })();
  </script>
  <script src="assets/js/config.js"></script>
  <script src="/assets/js/vendor/supabase-umd-2.49.4.min.js"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="assets/js/form-submit.js"></script>
  <script src="assets/js/header.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
