# Déploie automatiquement sur LWS à chaque push sur main.
# Configuration unique : GitHub → Settings → Secrets and variables → Actions
#   FTP_SERVER      ex. ftp.studyalready.com
#   FTP_USERNAME    identifiant FTP LWS
#   FTP_PASSWORD    mot de passe FTP LWS
#   FTP_SERVER_DIR  dossier distant, ex. /htdocs/ ou /www/ (avec / final)

name: Deploy LWS (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          log-level: minimal
          exclude: |
            **/.git*
            **/.github/**
            **/scripts/**
            README.md
            .vercelignore
            agent-transcripts/**
            mcps/**
