name: Deploy to LWS via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Sync to LWS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.LWS_FTP_HOST }}
          username: ${{ secrets.LWS_FTP_USERNAME }}
          password: ${{ secrets.LWS_FTP_PASSWORD }}
          server-dir: ${{ secrets.LWS_FTP_DIR }}
          protocol: ftp
          port: 21
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            **/Thumbs.db
            README.md
            .gitignore
            downloads/**
